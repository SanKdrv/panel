services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    depends_on:
      - prometheus
    networks:
      default:
      rag-shared:

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
      - grafana

  prometheus:
    image: prom/prometheus:v2.54.1
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml.template:/etc/prometheus/prometheus.yml.template:ro
      - ./ops/prometheus/render-prometheus.sh:/usr/local/bin/render-prometheus.sh:ro
    entrypoint:
      - /bin/sh
      - /usr/local/bin/render-prometheus.sh

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/rag-operations.json
      # Grafana работает под /grafana/ — nginx фронта проксирует туда.
      # PANEL_PUBLIC_URL задаётся в .env (например http://192.168.100.38:5173).
      GF_SERVER_ROOT_URL: "${PANEL_PUBLIC_URL:-http://localhost:5173}/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    # Порт наружу не публикуется: Grafana доступна только через nginx
    # фронта по пути /grafana/. Если нужен прямой доступ для отладки —
    # раскомментировать блок ports ниже.
    # ports:
    #   - "${GRAFANA_PORT:-3000}:3000"
    expose:
      - "3000"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

networks:
  rag-shared:
    external: true
