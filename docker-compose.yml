services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    depends_on:
      - prometheus
    volumes:
      # История quality-прогонов (переживает рестарты)
      - quality_runs:/app/app/data/runs
    networks:
      default:
      rag-shared:

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.54.1
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml.template:/etc/prometheus/prometheus.yml.template:ro
      - ./ops/prometheus/render-prometheus.sh:/usr/local/bin/render-prometheus.sh:ro
    entrypoint:
      - /bin/sh
      - /usr/local/bin/render-prometheus.sh

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      # Анонимный доступ ВЫКЛЮЧЕН: вход только по логину/паролю выше.
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/rag-operations.json
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

networks:
  rag-shared:
    external: true

volumes:
  quality_runs:
